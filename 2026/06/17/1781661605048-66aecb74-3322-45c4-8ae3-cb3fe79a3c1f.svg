<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <marker id="arrow3" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="#f7f8fb"/>
  <text x="480" y="54" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="28" font-weight="700" fill="#111827">3DGS 训练在优化什么</text>
  <text x="480" y="88" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#4b5563">从同一相机位姿渲染一张图，与真实照片比较误差，再反向更新高斯体</text>

  <g font-family="Arial, 'Microsoft YaHei', sans-serif">
    <rect x="70" y="160" width="200" height="170" rx="8" fill="url(#panel)" stroke="#cbd5e1"/>
    <text x="170" y="190" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">当前高斯场</text>
    <ellipse cx="135" cy="250" rx="44" ry="20" transform="rotate(-18 135 250)" fill="#2563eb" opacity="0.65"/>
    <ellipse cx="190" cy="268" rx="52" ry="24" transform="rotate(18 190 268)" fill="#f97316" opacity="0.60"/>
    <ellipse cx="172" cy="225" rx="34" ry="16" transform="rotate(36 172 225)" fill="#10b981" opacity="0.55"/>
    <text x="170" y="310" text-anchor="middle" font-size="14" fill="#4b5563">位置、形状、颜色、透明度</text>

    <rect x="380" y="130" width="200" height="130" rx="8" fill="#111827" stroke="#0f172a"/>
    <rect x="410" y="160" width="140" height="70" rx="4" fill="#f8fafc"/>
    <ellipse cx="472" cy="196" rx="48" ry="20" transform="rotate(12 472 196)" fill="#f97316" opacity="0.38"/>
    <ellipse cx="452" cy="186" rx="38" ry="16" transform="rotate(-18 452 186)" fill="#2563eb" opacity="0.36"/>
    <text x="480" y="292" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">渲染图像</text>

    <rect x="690" y="130" width="200" height="130" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="720" y="160" width="140" height="70" rx="4" fill="#f8fafc" stroke="#e5e7eb"/>
    <path d="M735 218 C770 164, 812 162, 845 216" fill="none" stroke="#f97316" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
    <path d="M742 188 C772 174, 812 177, 835 194" fill="none" stroke="#2563eb" stroke-width="8" stroke-linecap="round" opacity="0.55"/>
    <text x="790" y="292" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">真实照片</text>

    <rect x="560" y="372" width="200" height="74" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="660" y="402" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">计算误差</text>
    <text x="660" y="427" text-anchor="middle" font-size="14" fill="#4b5563">颜色差异 + 结构差异</text>

    <rect x="200" y="372" width="220" height="74" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="310" y="402" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">反向更新</text>
    <text x="310" y="427" text-anchor="middle" font-size="14" fill="#4b5563">移动、变形、增密、剪枝</text>
  </g>

  <g stroke="#334155" stroke-width="3" fill="none" marker-end="url(#arrow3)">
    <line x1="270" y1="245" x2="362" y2="200"/>
    <line x1="580" y1="195" x2="672" y2="195"/>
    <path d="M790 260 L790 324 L660 324 L660 360"/>
    <line x1="560" y1="409" x2="432" y2="409"/>
    <path d="M200 409 L142 409 L142 342"/>
  </g>
</svg>
